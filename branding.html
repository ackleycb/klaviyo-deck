  brand.className = 'slide-branding';
  document.querySelector('.reveal').appendChild(brand);

  var conf = document.createElement('div');
  conf.className = 'slide-confidential';
  conf.textContent = 'CONFIDENTIAL';
  document.querySelector('.reveal').appendChild(conf);

  function toggleBranding() {
    var current = Reveal.getCurrentSlide();
    var isContent = current && current.classList.contains('q-slide');
    brand.style.display = isContent ? 'block' : 'none';
    conf.style.display = isContent ? 'block' : 'none';
  }
  toggleBranding();
  Reveal.on('slidechanged', toggleBranding);

  // ================================================================
  // Two-dimensional nav: crosstab (xt) x view (chart/table)
  // Each slide's panes have data-xt and data-view attributes.
  // Clicking either nav updates the visible pane based on both states.
  // ================================================================
  function updatePanes(slide) {
    var xtActive = slide.querySelector('.xt-nav a.active');
    var viewActive = slide.querySelector('.view-nav a.active');
    if (!xtActive || !viewActive) return;

    var xt = xtActive.getAttribute('data-xt');
    var view = viewActive.getAttribute('data-view');

    slide.querySelectorAll('.pane').forEach(function(p) {
      var match = p.getAttribute('data-xt') === xt && p.getAttribute('data-view') === view;
      if (match) {
        p.classList.remove('pane-hidden');
        p.style.display = '';
      } else {
        p.classList.add('pane-hidden');
        p.style.display = 'none';
      }
    });
  }

  document.addEventListener('click', function(e) {
    // Crosstab nav click
    var xtLink = e.target.closest('.xt-nav a');
    if (xtLink) {
      e.preventDefault();
      e.stopPropagation();
      var nav = xtLink.closest('.xt-nav');
      nav.querySelectorAll('a').forEach(function(a) { a.classList.remove('active'); });
      xtLink.classList.add('active');
      updatePanes(xtLink.closest('section'));
      return;
    }

    // View toggle click
    var viewLink = e.target.closest('.view-nav a');
    if (viewLink) {
      e.preventDefault();
      e.stopPropagation();
      var nav = viewLink.closest('.view-nav');
      nav.querySelectorAll('a').forEach(function(a) { a.classList.remove('active'); });
      viewLink.classList.add('active');
      updatePanes(viewLink.closest('section'));
      return;
    }
  });

  var hScript = document.createElement('script');
  hScript.src = 'https://hypothes.is/embed.js';
  hScript.async = true;
  document.head.appendChild(hScript);

  // ================================================================
  // Edit Mode
  // ================================================================
  var editMode = false;

  var editBtn = document.createElement('div');
  editBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;background:#4169E1;color:#fff;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);font-family:sans-serif;';
  editBtn.textContent = 'Edit Mode';
  document.querySelector('.reveal').appendChild(editBtn);

  var saveBtn = document.createElement('div');
  saveBtn.style.cssText = 'position:fixed;bottom:20px;right:160px;z-index:9999;background:#28a745;color:#fff;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);font-family:sans-serif;display:none;';
  saveBtn.textContent = 'Save Edits';
  document.querySelector('.reveal').appendChild(saveBtn);

  var indicator = document.createElement('div');
  indicator.style.cssText = 'position:fixed;top:10px;right:20px;z-index:9999;background:#FFD700;color:#000;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;font-family:sans-serif;display:none;';
  indicator.textContent = 'EDITING MODE — click text to edit';
  document.querySelector('.reveal').appendChild(indicator);

  // Add edit mode CSS
  var editCSS = document.createElement('style');
  editCSS.textContent = '[contenteditable=true]{outline:2px dashed #4169E1!important;outline-offset:4px;cursor:text;}[contenteditable=true]:focus{outline:2px solid #4169E1!important;background:rgba(65,105,225,0.03);}';
  document.head.appendChild(editCSS);

  editBtn.addEventListener('click', function(e) {
    e.preventDefault(); e.stopPropagation();
    editMode = !editMode;
    document.querySelectorAll('.insights-panel, .q-slide h2, .q-footer').forEach(function(el) {
      if (editMode) el.setAttribute('contenteditable', 'true');
      else el.removeAttribute('contenteditable');
    });
    editBtn.textContent = editMode ? 'Exit Edit Mode' : 'Edit Mode';
    editBtn.style.background = editMode ? '#dc3545' : '#4169E1';
    saveBtn.style.display = editMode ? '' : 'none';
    indicator.style.display = editMode ? '' : 'none';
  });

  saveBtn.addEventListener('click', function(e) {
    e.preventDefault(); e.stopPropagation();
    // Clean up before save
    document.querySelectorAll('[contenteditable]').forEach(function(el) { el.removeAttribute('contenteditable'); });
    editBtn.style.display = 'none'; saveBtn.style.display = 'none'; indicator.style.display = 'none';
    // Download
    var html = document.documentElement.outerHTML;
    var blob = new Blob(['<!DOCTYPE html>\n<html>' + html.substring(html.indexOf('>') + 1)], {type: 'text/html'});
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'deck_edited.html'; a.click();
    // Restore UI
    editBtn.style.display = ''; editBtn.textContent = 'Edit Mode'; editBtn.style.background = '#4169E1';
    editMode = false;
  });

  // Prevent editable clicks from navigating slides
  document.addEventListener('click', function(e) {
    if (editMode && (e.target.closest('.insights-panel') || e.target.closest('.q-slide h2') || e.target.closest('.q-footer'))) {
      e.stopPropagation();
    }
  }, true);
